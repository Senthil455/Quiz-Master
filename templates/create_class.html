<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Class</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
body {
  background: #f6f7fb;
  font-family: 'Inter', Arial, sans-serif;
}

.container {
  max-width: 420px;
  margin: 48px auto 0 auto;
  background: #fff;
  border-radius: 1.35rem;
  box-shadow: 0 8px 32px 0 rgba(144,25,198,0.09);
  padding: 2.7rem 2.2rem 2.2rem 2.2rem;
}

h1 {
  color: #9219c6;
  font-size: 2rem;
  margin-bottom: 2rem;
  font-weight: 800;
  letter-spacing: -1.5px;
  text-align: center;
}

.form-group {
  margin-bottom: 1.1rem;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

label {
  font-weight: 500;
  margin-bottom: 0.25rem;
  color: #484f7e;
}

input[type="text"] {
  border: 1.5px solid #dacdf6;
  border-radius: 0.8rem;
  padding: 0.7rem 1rem;
  font-size: 1rem;
  background: #f5f3fa;
  width: 100%;
  color: #38325b;
  transition: border 0.2s;
}

input[type="text"]:focus {
  border: 2px solid #a020f0;
  outline: none;
  background: #fff;
}

.btn-primary {
  background: linear-gradient(90deg,#a020f0 0,#ff43b0 100%);
  color: #fff;
  border: none;
  border-radius: 0.8rem;
  font-weight: 700;
  font-size: 1.08rem;
  padding: 0.75rem 1.35rem;
  cursor: pointer;
  box-shadow: 0 2px 16px 0 #d1a3ff30;
  margin-top: 12px;
  margin-right: 10px;
  transition: background .15s, color .15s;
}
.btn-primary:hover {
  background: linear-gradient(90deg,#ff43b0 0,#a020f0 100%);
}

.btn-secondary {
  background: #f7f5fa;
  color: #9219c6;
  border: none;
  border-radius: 0.8rem;
  font-size: 1.08rem;
  padding: 0.75rem 1.35rem;
  font-weight: 600;
  cursor: pointer;
  transition: background .16s, color .16s;
  box-shadow: 0 1px 10px 0 #e8e3ec22;
  text-decoration: none;
  margin-top: 12px;
}
.btn-secondary:hover {
  background: #e9e2f8;
  color: #a020f0;
  text-decoration: underline;
}

.alert {
  padding: 0.6rem 1.2rem;
  border-radius: 0.8rem;
  margin-bottom: 1rem;
  font-size: 1rem;
  font-weight: 500;
}
.alert-success { background: #e7f9f1; color: #2c6a51; }
.alert-warning { background: #fff8ea; color: #9f6a00; }
.alert-error { background: #ffeaea; color: #bb1621; }
</style>

</head>
<body>
    <div class="container">
        <h1>Create New Class</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('create_class') }}">
            <div class="form-group">
                <label for="class_name">Class Name:</label>
                <input type="text" id="class_name" name="class_name" required placeholder="e.g., Math101, ScienceA">
            </div>

            <div class="form-group">
                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="subject" required placeholder="e.g., Mathematics, Physics">
            </div>

            <button type="submit" class="btn-primary">Create Class</button>
            <a href="{{ url_for('teacher_dashboard') }}" class="btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
